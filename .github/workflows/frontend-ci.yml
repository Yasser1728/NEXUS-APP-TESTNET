name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'tec-frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tec-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tec-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tec-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tec-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tec-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tec-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tec-frontend
    env:
      NEXT_PUBLIC_PI_APP_ID: test_app
      NEXT_PUBLIC_PI_SANDBOX: 'true'
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3001
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tec-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
